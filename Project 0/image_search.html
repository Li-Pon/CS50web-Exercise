<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Search</title>
    <style>
        body {
                font-family: sans-serif;
            }
            .upright {
                position: absolute;
                right: 0px;
                top: 0px;
            }
            a {
                margin-left: 2px;
                margin-right: 10px;
                text-decoration: none;
                font-size: 17px;
                border: 1px solid gray;
                padding: 4px;
                border-radius: 10px;
                background-color: rgb(223, 223, 223);
                color: blueviolet;
            }
            .bar {
                display: block;
                margin: auto;
                border-radius: 20px;
                height: 40px;
                width: 500px;
                border: 1px solid grey;
                background-image: url(search.png);
                background-repeat: no-repeat;
                background-size: 30px 30px;
                background-position: 2%;
                padding-left: 50px;
            }
            .search {
                display: block;
                margin: 20px auto 0;
                height: 30px;
                width: 140px;
                border-radius: 10px;
            }
            .title {
                font-size: 40px;
                font-weight: 800;
                margin: 250px auto 0;
                text-align: center;
            }
    </style>
</head>
<body>
    <div class="upright">
        <p><a href="index.html">Home</a></p>
    </div>
    <p class="title"><span style="color: red;">Li</span> <span style="color: purple;">Image</span> <span style="color: green;">Search</span></p>
    <form action="https://www.google.com/images">
        <input class="bar" type="text" name="q">
        <input class="search" type="submit" value="Google Search">
    </form>
</body>
</html>
